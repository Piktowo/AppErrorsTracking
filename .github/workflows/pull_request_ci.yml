name: 拉取请求检查

on:
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '!.github/workflows/**'

jobs:
  build:
    name: 拉取请求构建
    if: ${{ success() }}
    runs-on: ubuntu-latest
    env:
      MODULE_APK_OUTPUT_PATH: 'module-app/build/outputs/apk'
      DEMO_APK_OUTPUT_PATH: 'demo-app/build/outputs/apk'
    steps:
      - uses: actions/checkout@v4
      - name: 准备 GitHub 环境变量
        run: |
          GITHUB_SHA=${{ github.sha }}
          CI_COMMIT_ID=${GITHUB_SHA:0:7}
          echo "CI_COMMIT_ID=$CI_COMMIT_ID" >> $GITHUB_ENV
      - name: 配置 CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'
      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          java-package: jdk
          distribution: 'temurin'
          cache: 'gradle'
      - name: 缓存 Gradle 依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            gradle-deps
      - name: 缓存 Gradle 构建
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-core-${{ github.sha }}
          restore-keys: |
            gradle-builds
      - name: 使用 Gradle 构建
        run: |
          ./gradlew --build-cache --parallel :module-app:assembleDebug :module-app:assembleRelease :demo-app:assembleDebug :demo-app:assembleRelease
          echo "MODULE_DEBUG_APK_PATH=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/debug -name '*.apk')" >> $GITHUB_ENV
          echo "MODULE_RELEASE_APK_PATH=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/release -name '*.apk')" >> $GITHUB_ENV
          echo "DEMO_DEBUG_APK_PATH=$(find ${{ env.DEMO_APK_OUTPUT_PATH }}/debug -name '*.apk')" >> $GITHUB_ENV
          echo "DEMO_RELEASE_APK_PATH=$(find ${{ env.DEMO_APK_OUTPUT_PATH }}/release -name '*.apk')" >> $GITHUB_ENV
      - name: 上传产物 (模块调试版)
        uses: actions/upload-artifact@v4
        with:
          path: module-app/build/outputs/apk/debug/*.apk
          name: AppErrorsTracking-module-debug-${{ github.sha }}
      - name: 上传产物 (模块正式版)
        uses: actions/upload-artifact@v4
        with:
          path: module-app/build/outputs/apk/release/*.apk
          name: AppErrorsTracking-module-release-${{ github.sha }}
      - name: 上传产物 (演示调试版)
        uses: actions/upload-artifact@v4
        with:
          path: demo-app/build/outputs/apk/debug/*.apk
          name: AppErrorsTracking-demo-debug-${{ github.sha }}
      - name: 上传产物 (演示正式版)
        uses: actions/upload-artifact@v4
        with:
          path: demo-app/build/outputs/apk/release/*.apk
          name: AppErrorsTracking-demo-release-${{ github.sha }}