name: 提交时自动构建

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '!.github/workflows/**'

jobs:
  build:
    name: 构建 CI
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MODULE_APK_OUTPUT_PATH: 'module-app/build/outputs/apk'
      TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      COMMIT_MESSAGE: |+
        New push to GitHub\!
        ```
        ${{ github.event.head_commit.message }}
        ```by `${{ github.event.head_commit.author.name }}`
        See commit detail [here](${{ github.event.head_commit.url }})
      COMMIT_URL: ${{ github.event.head_commit.url }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 GitHub 环境变量
        run: |
          GITHUB_SHA=${{ github.sha }}
          CI_COMMIT_ID=${GITHUB_SHA:0:7}
          echo "CI_COMMIT_ID=$CI_COMMIT_ID" >> $GITHUB_ENV
      - name: 配置 CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'
      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          java-package: jdk
          distribution: 'temurin'
          cache: 'gradle'
      - name: 缓存 Gradle 依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            gradle-deps
      - name: 缓存 Gradle 构建
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-core-${{ github.sha }}
          restore-keys: |
            gradle-builds
      - name: 解码签名密钥库
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p .secret
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > .secret/universal.p12
      - name: 使用 Gradle 构建
        run: |
          ./gradlew :module-app:assembleDebug
          ./gradlew :module-app:assembleRelease
          echo "MODULE_DEBUG_APK_PATH=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/debug -name '*.apk')" >> $GITHUB_ENV
          echo "MODULE_RELEASE_APK_PATH=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/release -name '*.apk')" >> $GITHUB_ENV
      - name: 上传产物 (模块调试版)
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.MODULE_DEBUG_APK_PATH }}
          name: AppErrorsTracking-module-debug-${{ github.sha }}
      - name: 上传产物 (模块正式版)
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.MODULE_RELEASE_APK_PATH }}
          name: AppErrorsTracking-module-release-${{ github.sha }}
      - name: 推送产物到 Telegram
        run: |
          export module_debug=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/debug -name "*.apk")
          export module_release=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/release -name "*.apk")
          ESCAPED=`python3 -c 'import json,os,urllib.parse; msg = json.dumps(os.environ["COMMIT_MESSAGE"]); print(urllib.parse.quote(msg if len(msg) <= 1024 else json.dumps(os.environ["COMMIT_URL"])))'`
          curl -v "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMediaGroup?chat_id=${TG_CHAT_ID}&media=%5B%7B%22type%22%3A%22document%22%2C%20%22media%22%3A%22attach%3A%2F%2Fmodule_debug%22%7D%2C%7B%22type%22%3A%22document%22%2C%20%22media%22%3A%22attach%3A%2F%2Fmodule_release%22%2C%22parse_mode%22%3A%22MarkdownV2%22%2C%22caption%22:${ESCAPED}%7D%5D" \
           -F module_debug="@$module_debug" \
           -F module_release="@$module_release"
      - name: 发布快照预发布版
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
        run: |
          TAG="snapshot"
          COMMIT_ID="${CI_COMMIT_ID}"
          RELEASE_APK="${MODULE_RELEASE_APK_PATH}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          NOTES=$(printf '自动构建的测试版本 \U0001F6A7\n\n**提交**: [%s](%s)\n**作者**: %s\n**变更说明**: %s\n\n> \u26a0\ufe0f 此为自动构建的测试版，可能不稳定，正式版请关注 [Releases](https://github.com/%s/releases) 页面。' \
            "$COMMIT_ID" "$COMMIT_URL" "$COMMIT_AUTHOR" "$COMMIT_MSG" "$REPO")
          gh release create "$TAG" \
            --title "Snapshot ($COMMIT_ID)" \
            --notes "$NOTES" \
            --prerelease \
            "$RELEASE_APK"