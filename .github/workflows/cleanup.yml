name: Cleanup Workflow Runs and Caches

on:
  workflow_dispatch:
    inputs:
      cleanup_runs:
        description: '清理历史工作流记录'
        type: boolean
        default: true
      cleanup_caches:
        description: '清理构建缓存'
        type: boolean
        default: true

jobs:
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        if: ${{ inputs.cleanup_runs }}
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0

      - name: Delete all caches
        if: ${{ inputs.cleanup_caches }}
        run: |
          echo "正在获取所有缓存..."
          CACHE_KEYS=$(gh cache list --repo ${{ github.repository }} --json key --jq '.[].key')
          if [ -z "$CACHE_KEYS" ]; then
            echo "没有找到任何缓存"
          else
            echo "$CACHE_KEYS" | while read key; do
              echo "删除缓存: $key"
              gh cache delete "$key" --repo ${{ github.repository }}
            done
            echo "全部缓存已清理完毕"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
