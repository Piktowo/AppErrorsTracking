name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release CI
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MODULE_APK_OUTPUT_PATH: 'module-app/build/outputs/apk'
    steps:
      - uses: actions/checkout@v4
      - name: Prepare GitHub Env
        run: |
          GITHUB_SHA=${{ github.sha }}
          GITHUB_CI_COMMIT_ID=${GITHUB_SHA:0:7}
          echo "GITHUB_CI_COMMIT_ID=$GITHUB_CI_COMMIT_ID" >> $GITHUB_ENV
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'
      - name: Prepare Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          java-package: jdk
          distribution: 'temurin'
          cache: 'gradle'
      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            gradle-deps
      - name: Cache Gradle Build
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-core-${{ github.sha }}
          restore-keys: |
            gradle-builds
      - name: Decode Signing Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p .secret
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > .secret/universal.p12
      - name: Build with Gradle
        run: |
          ./gradlew :module-app:assembleRelease
          echo "MODULE_RELEASE_APK_PATH=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/release -name '*.apk')" >> $GITHUB_ENV
      - name: Publish Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "AppErrorsTracking ${{ github.ref_name }}" \
            --notes "## AppErrorsTracking ${{ github.ref_name }}

请在下方 Assets 中下载 Release APK 进行安装。

**构建提交**: [${{ env.GITHUB_CI_COMMIT_ID }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            --latest \
            ${{ env.MODULE_RELEASE_APK_PATH }}
        env:
          GH_TOKEN: ${{ github.token }}
