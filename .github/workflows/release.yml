name: 标签触发发布正式版

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: 发布 CI
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MODULE_APK_OUTPUT_PATH: 'module-app/build/outputs/apk'
    steps:
      - uses: actions/checkout@v4
      - name: 准备 GitHub 环境变量
        run: |
          GITHUB_SHA=${{ github.sha }}
          CI_COMMIT_ID=${GITHUB_SHA:0:7}
          echo "CI_COMMIT_ID=$CI_COMMIT_ID" >> $GITHUB_ENV
      - name: 配置 CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.1'
      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          java-package: jdk
          distribution: 'temurin'
          cache: 'gradle'
      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            gradle-deps
      - name: 缓存 Gradle 构建
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-core-${{ github.sha }}
          restore-keys: |
            gradle-builds
      - name: 解码签名密钥库
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p .secret
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > .secret/universal.p12
      - name: 使用 Gradle 构建
        run: |
          ./gradlew :module-app:assembleRelease
          echo "MODULE_RELEASE_APK_PATH=$(find ${{ env.MODULE_APK_OUTPUT_PATH }}/release -name '*.apk')" >> $GITHUB_ENV
      - name: 发布正式版本
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          COMMIT_ID="${CI_COMMIT_ID}"
          RELEASE_APK="${MODULE_RELEASE_APK_PATH}"
          NOTES=$(printf '## AppErrorsTracking %s\n\n\u8bf7\u5728\u4e0b\u65b9 Assets \u4e2d\u4e0b\u8f7d Release APK \u8fdb\u884c\u5b89\u88c5\u3002\n\n**\u6784\u5efa\u63d0\u4ea4**: [%s](https://github.com/%s/commit/%s)' \
            "$TAG" "$COMMIT_ID" "$REPO" "$COMMIT_SHA")
          gh release create "$TAG" \
            --title "AppErrorsTracking $TAG" \
            --notes "$NOTES" \
            --latest \
            "$RELEASE_APK"
